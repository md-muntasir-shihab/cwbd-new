name: CI Pipeline

on:
  push:
    branches: [main, staging, production]
  pull_request:
    branches: [main, staging, production]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  COVERAGE_THRESHOLD: 80

jobs:
  # ─── Backend Build ───────────────────────────────────────────────
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: TypeScript compile
        run: npm run build
        working-directory: backend

  # ─── Frontend Build ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Backend Tests ───────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=json --coverage.reporter=html
        working-directory: backend
        env:
          NODE_ENV: test
          CACHE_ENABLED: 'false'
          JWT_SECRET: ci-test-secret
          MONGODB_URI: ''

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
            echo "Line coverage: ${LINES}%"
            echo "## Backend Coverage: ${LINES}%" >> $GITHUB_STEP_SUMMARY
            if (( $(echo "$LINES < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
              echo "::error::Backend line coverage ${LINES}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
              exit 1
            fi
          else
            echo "::warning::Coverage summary not found, skipping threshold check"
          fi
        working-directory: backend

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ─── Frontend Tests ──────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: frontend
        env:
          NODE_ENV: test

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
            echo "Line coverage: ${LINES}%"
            echo "## Frontend Coverage: ${LINES}%" >> $GITHUB_STEP_SUMMARY
            if (( $(echo "$LINES < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
              echo "::error::Frontend line coverage ${LINES}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
              exit 1
            fi
          else
            echo "::warning::Coverage summary not found, skipping threshold check"
          fi
        working-directory: frontend

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ─── Security Scanning ──────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Backend npm audit
        id: backend-audit
        run: |
          echo "## Backend Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail on high/critical vulnerabilities
          npm audit --audit-level=high
        working-directory: backend

      - name: Frontend npm audit
        id: frontend-audit
        run: |
          echo "## Frontend Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail on high/critical vulnerabilities
          npm audit --audit-level=high
        working-directory: frontend

      - name: Secret scanning
        run: |
          echo "## Secret Scanning Results" >> $GITHUB_STEP_SUMMARY
          FOUND=0

          ENV_FILES=$(find . -name '.env' -not -path './.git/*' -not -path '*/node_modules/*' -not -name '.env.example' 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "⚠️ Found .env files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$ENV_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            FOUND=1
          else
            echo "✅ No .env files found in committed code" >> $GITHUB_STEP_SUMMARY
          fi

          API_KEYS=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' \
            -E '(AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|sk-[0-9a-zA-Z]{32,}|ghp_[0-9a-zA-Z]{36}|xox[bpoas]-[0-9a-zA-Z-]+)' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null || true)
          if [ -n "$API_KEYS" ]; then
            echo "⚠️ Potential API keys found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$API_KEYS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            FOUND=1
          else
            echo "✅ No API key patterns detected" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Potential secrets detected. Review the job summary."
          fi

      - name: ESLint security analysis (backend)
        run: |
          echo "## ESLint Security — Backend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx eslint --no-eslintrc --plugin security --rule '{"security/detect-eval-with-expression":"warn","security/detect-non-literal-regexp":"warn","security/detect-possible-timing-attacks":"warn","security/detect-no-csrf-before-method-override":"warn"}' \
            'src/**/*.ts' 2>&1 | tee eslint-output.txt || true
          cat eslint-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: backend

      - name: ESLint security analysis (frontend)
        run: |
          echo "## ESLint Security — Frontend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx eslint --no-eslintrc --plugin security --rule '{"security/detect-eval-with-expression":"warn","security/detect-non-literal-regexp":"warn","security/detect-possible-timing-attacks":"warn"}' \
            'src/**/*.{ts,tsx}' 2>&1 | tee eslint-output.txt || true
          cat eslint-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: frontend

      - name: Security scan summary
        if: always()
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "Security scan completed. Review results above." >> $GITHUB_STEP_SUMMARY

  # ─── Deploy Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: |
      (github.ref == 'refs/heads/staging' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Deploy staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Replace this step with your actual deployment commands"
          echo "e.g., firebase deploy --only hosting:staging, render deploy, etc."

  # ─── Deploy Production ──────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: |
      (github.ref == 'refs/heads/production' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Deploy production
        run: |
          echo "🚀 Deploying to production environment..."
          echo "Replace this step with your actual deployment commands"
          echo "e.g., firebase deploy --only hosting:production, render deploy, etc."
